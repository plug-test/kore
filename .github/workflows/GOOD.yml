name: Auto Like
on:
  schedule:
    # 日本時間 1:00, 2:00, 3:00, 4:00, 5:00, 6:00, 7:00, 8:00, 9:00, 10:00
    # UTCでは前日の 16, 17, 18, 19, 20, 21, 22, 23, 当日の 0, 1 となります
    - cron: '0 16,17,18,19,20,21,22,23,0,1 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install selenium
      - name: Run script
        env:
          RAKUTEN_CONFIG_JSON: ${{ secrets.RAKUTEN_CONFIG_JSON }}
        run: python GOOD.py
